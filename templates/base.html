<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{{ config.description }}" />
    <meta name="author" content="{{ config.extra.author }}" />
    <meta name="robots" content="index, follow" />
    <title>{{ config.title }} - Software Engineer</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <!--
      Hi there! Thanks for inspecting the source.
      This site is built minimally with Zola + Sass. No heavy JS frameworks.
    -->
    <main class="container">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
