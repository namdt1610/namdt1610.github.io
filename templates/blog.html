{% extends "base.html" %} 
{% block content %}
<header class="header">
  <div class="header-top">
    <div>
      <a href="/" style="display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; color: var(--fg-dim); font-size: 0.9rem;">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Back to Resume
      </a>
      <h1 class="name">Engineering Notes</h1>
    </div>
  </div>
</header>

<ul class="blog-list">
  {% for page in section.pages %}
  <li>
    <span class="date">{{ page.date | date(format="%Y-%m-%d") }}</span>
    <a href="{{ page.permalink }}">{{ page.title }}</a>
  </li>
  {% endfor %}
</ul>

<footer class="footer">
  <div>DANG TRAN NAM &copy; {{ now() | date(format="%Y") }}</div>
  <div>
    <a href="mailto:nam.dt161@gmail.com">Contact</a>
  </div>
</footer>
{% endblock %}
